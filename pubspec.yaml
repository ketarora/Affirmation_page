name: nishaffs
description: "NishAffs ✨ — India's Cutest Aesthetic Affirmation App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  # The following dependencies might require extra native setup for production if needed,
  # but work gracefully via UI placeholders for our front-end logic right now.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/