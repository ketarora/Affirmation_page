<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NishAffs ✨ - Cute Daily Affirmations & Law of Attraction App">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NishAffs ✨">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NishAffs ✨</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { background-color: #FDE8F0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Quicksand', sans-serif; flex-direction: column; overflow: hidden; }
    .loader-container { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .flower { font-size: 50px; animation: bounceAndSpin 2s ease-in-out infinite; margin-bottom: 20px; }
    .text { color: #E8729E; font-size: 18px; font-weight: bold; letter-spacing: 2px; animation: pulse 1.5s infinite; text-shadow: 0 2px 10px rgba(255, 182, 211, 0.5); }
    .subtext { color: #BBA8B3; font-size: 12px; margin-top: 8px; letter-spacing: 1px; }
    @keyframes bounceAndSpin { 0% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } 100% { transform: translateY(0) rotate(360deg); } }
    @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; text-shadow: 0 2px 15px rgba(232, 114, 158, 0.8); } 100% { opacity: 0.7; } }
  </style>
  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
  </script>
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="loading" class="loader-container">
    <div class="flower">🌸</div>
    <div class="text">MANIFESTING...</div>
    <div class="subtext">gathering magic ✨</div>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            document.getElementById('loading').style.display = 'none';
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
